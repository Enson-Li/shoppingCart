<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>訂單管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="app">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">已收到的訂單清單</h1>
        
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">時間</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">公司/人事</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">姓名/電話</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">商品摘要</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">總金額</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr v-for="order in orders" :key="order.timestamp">
                        <td class="px-6 py-4 text-sm">{{ new Date(order.timestamp).toLocaleString() }}</td>
                        <td class="px-6 py-4 text-sm">{{ order.user.company }} / {{ order.user.empId }}</td>
                        <td class="px-6 py-4 text-sm">{{ order.user.name }}<br><span class="text-gray-400">{{ order.user.phone }}</span></td>
                        <td class="px-6 py-4 text-sm">
                            <ul>
                                <li v-for="item in order.items">- {{ item.name }} x {{ item.quantity }}</li>
                            </ul>
                        </td>
                        <td class="px-6 py-4 text-sm font-bold text-emerald-600">${{ order.total.toLocaleString() }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const orders = ref([]);
                onMounted(async () => {
                    try {
                        const res = await fetch('orders.json'); // 讀取寫入後的 JSON
                        orders.value = await res.json();
                    } catch (e) { console.error("尚無訂單資料"); }
                });
                return { orders };
            }
        }).mount('#app');
    </script>
</body>
</html>

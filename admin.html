<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>訂單管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 p-8">
  <div id="app">
    <!-- 導覽列：加上 mb-8 產生下邊距 -->
    <nav class="bg-gray-800 text-white shadow-md mb-8">
      <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <a href="index_admin.html" class="flex items-center gap-2 hover:text-emerald-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="font-bold">管理後台首頁</span>
          </a>
          <span class="text-gray-500">/</span>
          <!-- 根據當前頁面顯示名稱 -->
          <span class="text-gray-300 text-sm">交易清單 (或商品維護)</span>
        </div>
        
        <div>
          <a href="index.html" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition">前往前台</a>
        </div>
      </div>
    </nav>
    
    <!-- 內容區域標題 -->
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-2xl font-bold mb-6 text-gray-800">已收到的訂單清單</h1>
    </div>
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">時間</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">公司/人事</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">姓名/電話</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">商品摘要</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">總金額</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr v-for="order in orders" :key="order.timestamp">
            <td class="px-6 py-4 text-sm">{{ new Date(order.timestamp).toLocaleString() }}</td>
            <td class="px-6 py-4 text-sm">{{ order.user.company }} / {{ order.user.empId }}</td>
            <td class="px-6 py-4 text-sm">{{ order.user.name }}<br><span class="text-gray-400">{{ order.user.phone }}</span></td>
            <td class="px-6 py-4 text-sm">
              <ul>
                <li v-for="item in order.items">- {{ item.name }} x {{ item.quantity }}</li>
              </ul>
            </td>
            <td class="px-6 py-4 text-sm font-bold text-emerald-600">${{ order.total.toLocaleString() }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const orders = ref([]);
        onMounted(async () => {
          try {
            const res = await fetch('orders.json'); // 讀取寫入後的 JSON
            orders.value = await res.json();
          } catch (e) { console.error("尚無訂單資料"); }
        });
        return { orders };
      }
    }).mount('#app');
  </script>
</body>
</html>

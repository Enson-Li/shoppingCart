<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner 維護管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-gray-100">
  <div id="app" v-cloak>
    <!-- 導覽列：統一 max-w-6xl 並與前兩頁對齊 -->
    <nav class="bg-gray-800 text-white shadow-md">
      <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <a href="index_admin.html" class="flex items-center gap-2 hover:text-emerald-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="font-bold">管理後台首頁</span>
          </a>
          <span class="text-gray-500">/</span>
          <span class="text-gray-300 text-sm">Banner 維護管理</span>
        </div>
        <div>
          <a href="index.html" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition">前往前台</a>
        </div>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-12 pb-12">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">首頁 Banner 管理</h1>
        <button @click="openModal()" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition shadow-md">
          + 新增 Banner
        </button>
      </div>

      <!-- Banner 列表 -->
      <div class="grid gap-4">
        <div v-for="(b, index) in banners" :key="index" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 items-center hover:shadow-md transition">
          <!-- 圖片判斷：支援 Base64 或 路徑 -->
          <img :src="b.image.startsWith('data') ? b.image : './banners/' + b.image" class="w-64 h-32 object-cover rounded-lg bg-gray-100 shadow-inner">
          
          <div class="flex-1 text-center md:text-left">
            <h3 class="font-bold text-lg text-gray-800">{{ b.title }}</h3>
            <div class="mt-2 space-y-1">
              <span class="inline-block bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded">關聯商品 ID: {{ b.productId }}</span>
              <p class="text-xs text-gray-400 truncate max-w-xs md:max-w-md">資料來源：{{ b.image.startsWith('data') ? '本地上傳' : b.image }}</p>
            </div>
          </div>
          
          <div class="flex gap-4 border-l pl-6">
            <button @click="openModal(b, index)" class="text-blue-600 hover:text-blue-800 font-medium">編輯</button>
            <button @click="deleteBanner(index)" class="text-red-500 hover:text-red-700 font-medium">刪除</button>
          </div>
        </div>
      </div>
    </main>

    <!-- 編輯彈窗 (Modal) -->
    <div v-if="isModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
      <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-700">{{ editIndex === -1 ? '新增 Banner' : '編輯 Banner' }}</h2>
          <button @click="isModalOpen = false" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        
        <div class="p-6 space-y-5">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">廣告標題</label>
            <input v-model="tempBanner.title" type="text" placeholder="輸入廣告主要文字" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 outline-none">
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">上傳圖片</label>
            <input type="file" @change="handleFileUpload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
            
            <!-- 圖片預覽區 -->
            <div v-if="tempBanner.image" class="mt-3 relative group">
              <p class="text-xs text-gray-400 mb-1">預覽：</p>
              <img :src="tempBanner.image.startsWith('data') ? tempBanner.image : './banners/' + tempBanner.image" class="w-full h-40 object-cover rounded-lg border shadow-sm">
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">關聯商品 ID</label>
            <input v-model.number="tempBanner.productId" type="number" placeholder="點擊後跳轉的商品編號" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 outline-none">
          </div>
        </div>

        <div class="p-6 bg-gray-50 border-t flex gap-3">
          <button @click="isModalOpen = false" class="flex-1 py-2.5 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition">取消</button>
          <button @click="saveBanner" class="flex-1 py-2.5 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600 shadow-md transition">儲存設定</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const banners = ref([]);
        const isModalOpen = ref(false);
        const editIndex = ref(-1);
        const tempBanner = ref({ title: '', image: '', productId: null });

        const fetchBanners = async () => {
          try {
            const res = await fetch('banners.json');
            banners.value = await res.json();
          } catch (e) { 
            console.log("尚無 JSON 資料或讀取失敗"); 
            // 預設假資料供測試
            banners.value = [{ title: '夏季大促銷', image: 'sale.jpg', productId: 101 }];
          }
        };

        const openModal = (item = null, index = -1) => {
          editIndex.value = index;
          if (item) {
            tempBanner.value = { ...item };
          } else {
            tempBanner.value = { title: '', image: '', productId: null };
          }
          isModalOpen.value = true;
        };

        // 核心修改：處理檔案讀取
        const handleFileUpload = (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (event) => {
            // 將圖片轉換成 Base64 字串存入 tempBanner.image
            tempBanner.value.image = event.target.result;
          };
          reader.readAsDataURL(file);
        };

        const saveBanner = () => {
          if (!tempBanner.value.title || !tempBanner.value.image) {
            alert('請填寫標題並上傳圖片');
            return;
          }

          if (editIndex.value === -1) {
            banners.value.push({ ...tempBanner.value });
          } else {
            banners.value[editIndex.value] = { ...tempBanner.value };
          }
          isModalOpen.value = false;
          console.log("最新的 Banners 陣列:", JSON.stringify(banners.value));
          alert("儲存成功！請從控制台複製 JSON 內容手動更新您的 banners.json");
        };

        const deleteBanner = (index) => {
          if (confirm('確定要刪除這張 Banner 嗎？')) {
            banners.value.splice(index, 1);
          }
        };

        onMounted(fetchBanners);

        return { banners, isModalOpen, tempBanner, editIndex, openModal, saveBanner, deleteBanner, handleFileUpload };
      }
    }).mount('#app');
  </script>
</body>
</html>
